<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>repository0</title>
  <meta property="og:title" content="repository0">
  <meta property="og:description" content="An autonomous repository powered by agentic-lib">
  <meta property="og:type" content="website">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; color: #333; }
    h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
    a { color: #0366d6; }
    .identity { background: #f6f8fa; padding: 1rem; border-radius: 6px; margin: 1rem 0; font-family: monospace; }
    .identity dt { font-weight: bold; color: #666; }
    .identity dd { margin: 0 0 0.5rem 0; font-size: 1.1rem; }
    #demo-output { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 6px; font-family: monospace; white-space: pre-wrap; min-height: 2rem; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { border: 1px solid #eee; padding: 0.5rem; text-align: left; font-family: monospace; }
    th { background: #fafafa; }
    label { display:block; margin-top: 1rem; }
    input[type="text"] { width: 100%; padding: 0.5rem; font-family: monospace; }
    button { margin-top: 0.5rem; padding: 0.5rem 1rem; }
  </style>
</head>
<body>
  <h1 id="lib-name">repository0</h1>
  <div class="identity">
    <dl>
      <dt>Version</dt>
      <dd id="lib-version">loading...</dd>
      <dt>Description</dt>
      <dd id="lib-description">loading...</dd>
    </dl>
  </div>

  <section>
    <h2>UUID encoding demo</h2>
    <label>UUID (v7-style hex string):
      <input id="uuid-input" type="text" value="01234567-89ab-cdef-0123-456789abcdef" />
    </label>
    <button id="encode-btn">Encode UUID</button>

    <div id="uuid-results">
      <table id="comparison-table">
        <thead>
          <tr><th>Encoding</th><th>Charset Size</th><th>Bits/char</th><th>Encoded</th><th>Length</th></tr>
        </thead>
        <tbody id="comparison-body">
        </tbody>
      </table>
    </div>
  </section>

  <h2>Output</h2>
  <div id="demo-output">Loading library...</div>

  <script type="module">
    try {
      const lib = await import('./lib.js');
      const { name, version, description, listEncodings, encodeUUID } = lib;
      document.getElementById('lib-name').textContent = name;
      document.getElementById('lib-version').textContent = version;
      document.getElementById('lib-description').textContent = description || '(no description)';
      document.getElementById('demo-output').textContent = JSON.stringify({ name, version, description }, null, 2);
      document.title = name + ' v' + version;

      const body = document.getElementById('comparison-body');
      const encs = listEncodings();

      function show(uuid) {
        body.innerHTML = '';
        for (const enc of encs) {
          try {
            const encoded = encodeUUID(enc.name, uuid);
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${enc.name}</td><td>${enc.charsetSize}</td><td>${(enc.bitsPerChar||0).toFixed(2)}</td><td><code>${encoded}</code></td><td>${encoded.length}</td>`;
            body.appendChild(tr);
          } catch (e) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${enc.name}</td><td>${enc.charsetSize}</td><td>${(enc.bitsPerChar||0).toFixed(2)}</td><td colspan="2">Error: ${e.message}</td>`;
            body.appendChild(tr);
          }
        }
      }

      document.getElementById('encode-btn').addEventListener('click', () => {
        const uuid = document.getElementById('uuid-input').value.trim();
        show(uuid);
      });

      // show the default on load
      show(document.getElementById('uuid-input').value.trim());

    } catch (e) {
      document.getElementById('lib-version').textContent = '(error)';
      document.getElementById('lib-description').textContent = e.message;
      document.getElementById('demo-output').textContent = 'Failed to load library: ' + e.message;
    }
  </script>
</body>
</html>
